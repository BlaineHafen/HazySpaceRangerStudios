<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazy Space Ranger Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anta&family=Dancing+Script:wght@600&family=Montserrat:wght@400;500&family=Outfit:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js"}}</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#050505;font-family:'Outfit',sans-serif;color:rgba(255,255,255,.9);overflow-x:hidden;min-height:100vh}

/* ===================== PARTICLE CANVAS ===================== */
#particle-canvas,
#shooting-stars{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
  opacity:0;
  transition:opacity 2s ease;
}
#particle-canvas.visible,
#shooting-stars.visible{
  opacity:1;
}
/* Stripes scroll WITH the page (absolute, document-tall) — above the fixed
   starfield, below the content/nav. Height is set in JS to the document height. */
#stripes-canvas{
  position:absolute;top:0;left:0;
  width:100%;z-index:1;
  pointer-events:none;
  opacity:0;
  transition:opacity 1.2s ease;
}
#stripes-canvas.visible{opacity:1}

/* ===================== NAV BAR ===================== */
.nav{
  position:sticky;top:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px;background:#050505;width:100%;
}
.nav-logo{width:154px;display:flex;align-items:center;flex-shrink:0;cursor:pointer}
.nav-logo img{height:32px;width:auto;transition:filter .3s}
.nav-logo:hover img{filter:brightness(1.53)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-family:'Anta',sans-serif;font-size:20px;color:#a7a7a7;text-decoration:none;transition:color .3s;cursor:pointer;display:flex;flex-direction:column;align-items:center}
.nav-links a::after{content:'';display:block;width:100%;height:2px;transform:scaleX(0);transition:transform .3s}
.nav-links a:hover{color:#fff}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-links a[href="#games"]::after{background:#360084}
.nav-links a[href="#shop"]::after{background:#8F0178}
.nav-links a[href="#about"]::after{background:#DF1A58}
.nav-links a[href="#crew"]::after{background:#F5B345}

/* CTA button */
.nav-cta{font-family:'Anta',sans-serif;font-size:20px;padding:12px;background:none;color:#a7a7a7;border:1px solid #a7a7a7;text-decoration:none;transition:color .3s, border-color .3s;cursor:pointer;position:relative;overflow:hidden}
.nav-cta span{position:relative;z-index:1}
.nav-cta:hover{color:#fff;border-color:#fff}
.nav-cta .stripe{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;transition:transform .4s ease}
.nav-cta .stripe svg{display:block;width:100%;height:100%}
.nav-cta .stripe-1{transform:translate(-33.3%,-100%)}
.nav-cta:hover .stripe-1{transform:translate(0,0)}
.nav-cta .stripe-2{transform:translate(33.3%,100%)}
.nav-cta:hover .stripe-2{transform:translate(0,0)}
.nav-cta .stripe-3{transform:translate(-33.3%,-100%)}
.nav-cta:hover .stripe-3{transform:translate(0,0)}
.nav-cta .stripe-4{transform:translate(33.3%,100%)}
.nav-cta:hover .stripe-4{transform:translate(0,0)}
.nav-cta .stripe-1{transition-delay:0s}
.nav-cta .stripe-2{transition-delay:.06s}
.nav-cta .stripe-3{transition-delay:.12s}
.nav-cta .stripe-4{transition-delay:.18s}

/* Mobile nav pieces — hidden on desktop, shown via the 768px breakpoint */
.nav-cursive{display:none;font-family:'Dancing Script',cursive;font-weight:600;font-size:24px;color:#fff;line-height:1;pointer-events:none}
.nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0}
.nav-burger span{display:block;width:24px;height:2px;background:#fff;margin:0 auto;transition:transform .3s ease, opacity .2s ease}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-menu{
  display:none;
  position:absolute;top:100%;left:0;right:0;z-index:19;
  flex-direction:column;gap:4px;
  background:#050505;padding:8px 20px 20px;
  border-top:1px solid rgba(255,255,255,.08);
  transform:translateY(-8px);opacity:0;pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
}
.nav-menu.open{transform:none;opacity:1;pointer-events:auto}
.nav-menu a{font-family:'Anta',sans-serif;font-size:18px;color:#a7a7a7;text-decoration:none;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);transition:color .3s}
.nav-menu a:hover,.nav-menu a:active{color:#fff}
.nav-menu .nav-menu-cta{margin-top:12px;border:1px solid #a7a7a7;border-bottom:1px solid #a7a7a7;text-align:center;padding:12px;color:#fff}

/* ===================== HERO SECTION ===================== */
.hero{
  position:relative;
  width:100%;
  height:100vh;
  overflow:visible;
  background:transparent;
  padding:0 160px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
}

/* Hero content: badge, text, chevron stacked and left-aligned */
.hero-content{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  max-width:896px;
  width:100%;
}

/* Static badge logo above the headline */
.hero-logo{
  position:relative;
  width:300px;height:301px;
  margin-bottom:32px;
  opacity:0;
  transform:translateY(12px) scale(.96);
  transition:opacity .9s ease, transform .9s cubic-bezier(.22,1,.36,1);
}
.hero-logo.visible{opacity:1;transform:none}
.hero-logo img{display:block;width:100%;height:100%}

.hero-text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  color:#fff;
  opacity:0;
}
.hero-text.visible{opacity:1}

.hero-headline{
  font-family:'Anta',sans-serif;
  font-size:64px;
  white-space:nowrap;
  line-height:normal;
  overflow:hidden;
  color:#fff;
  text-shadow:0 0 8px rgba(255,255,255,.6),0 0 20px rgba(255,255,255,.25);
  transition:text-shadow .3s ease;
}
.hero-headline.done{
  text-shadow:none;
}
.hero-body{
  font-family:'Montserrat',sans-serif;
  font-size:32px;
  font-weight:400;
  line-height:normal;
  max-width:896px;
  overflow:hidden;
  color:#fff;
  text-shadow:0 0 8px rgba(255,255,255,.6),0 0 20px rgba(255,255,255,.25);
  transition:text-shadow .3s ease;
}
.hero-body.done{
  text-shadow:none;
}
.hero-headline .cursor,
.hero-body .cursor{
  display:inline-block;
  width:.55em;
  height:1.1em;
  background:#fff;
  margin-left:1px;
  vertical-align:text-bottom;
  animation:blink .5s step-end infinite;
}
@keyframes blink{
  50%{opacity:0}
}

/* ===================== GAMES TRANSITION DIVIDER ===================== */
.transition{
  position:relative;
  z-index:2;
  width:100%;
  min-height:560px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  background:transparent;
}
.transition-line{
  width:2px;height:220px;
  background:rgba(255,255,255,.55);
  border-radius:1px;
}
.transition h3{
  font-family:'Anta',sans-serif;
  font-size:24px;
  font-weight:400;
  color:#fff;
}

/* ===================== PROJECT CELESTRA ===================== */
.celestra{
  position:relative;
  z-index:2;
  width:100%;
  /* at least a full viewport tall so the centred ant can always be scrolled
     into view — it's the last section, so a shorter section can't be reached
     on tall screens */
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding:120px 80px;
  background:transparent;   /* lets the particle ant show through behind it */
}
.celestra-text{position:relative;z-index:2;max-width:520px}
.celestra h2{
  font-family:'Anta',sans-serif;
  font-size:48px;
  font-weight:400;
  color:#fff;
  margin-bottom:24px;
}
.celestra p{
  font-family:'Montserrat',sans-serif;
  font-size:24px;
  font-weight:400;
  line-height:1.35;
  color:#fff;
  max-width:435px;
}
/* invisible anchor — marks where the particle ant assembles (right side).
   Sized by HEIGHT (capped to the viewport) and width derived from the aspect
   ratio, so the whole ant — legs included — always fits on screen. */
.celestra-ant{
  position:absolute;
  right:6%;
  top:50%;
  transform:translateY(-50%);
  height:min(620px,72vh);
  aspect-ratio:738 / 676;   /* width is derived from height */
  width:auto;
  z-index:1;
  pointer-events:none;
}

/* ===================== RESPONSIVE ===================== */
@media(max-width:768px){
  .nav{padding:16px}
  .nav-logo{width:auto}
  .nav-logo img{height:28px}
  .nav-links{display:none}
  .nav-cta{display:none}
  .nav-cursive{display:block}
  .nav-burger{display:flex}
  .nav-menu{display:flex}
  .hero{padding:140px 16px 40px;min-height:600px;justify-content:flex-start}
  .hero-logo{width:120px;height:120px;margin-bottom:32px}
  .hero-headline{font-size:32px;white-space:normal}
  .hero-body{font-size:16px}
  .transition{min-height:380px;gap:16px}
  .transition-line{height:130px}
  .celestra{padding:80px 16px;min-height:0}
  .celestra h2{font-size:28px}
  .celestra p{font-size:16px}
  .celestra-ant{position:relative;right:auto;top:auto;transform:none;width:100%;margin-top:32px}
}
</style>
</head>
<body>

<!-- Particle Background -->
<canvas id="particle-canvas"></canvas>
<canvas id="shooting-stars"></canvas>
<!-- Right-side racing stripes (halftone formation) -->
<canvas id="stripes-canvas"></canvas>

<!-- Nav Bar -->
<nav class="nav" id="nav">
  <div class="nav-logo">
    <img src="stamp-logo.svg" alt="HSRS Logo" />
  </div>
  <ul class="nav-links">
    <li><a href="#games">Games</a></li>
    <li><a href="#shop">Shop</a></li>
    <li><a href="#about">About</a></li>

  </ul>
  <a href="#" class="nav-cta">
    <div class="stripe stripe-1"><svg preserveAspectRatio="none" viewBox="0 0 144 46" xmlns="http://www.w3.org/2000/svg"><path d="M0 0L48 46H0V0Z" fill="#360084"/></svg></div>
    <div class="stripe stripe-2"><svg preserveAspectRatio="none" viewBox="0 0 144 46" xmlns="http://www.w3.org/2000/svg"><path d="M0 0H48L96 46H48L0 0Z" fill="#8F0178"/></svg></div>
    <div class="stripe stripe-3"><svg preserveAspectRatio="none" viewBox="0 0 144 46" xmlns="http://www.w3.org/2000/svg"><path d="M48 0H96L144 46H96L48 0Z" fill="#DF1A58"/></svg></div>
    <div class="stripe stripe-4"><svg preserveAspectRatio="none" viewBox="0 0 144 46" xmlns="http://www.w3.org/2000/svg"><path d="M96 0H144V46L96 0Z" fill="#F5B345"/></svg></div>
    <span>Join The Crew</span>
  </a>

  <!-- Mobile-only: cursive wordmark + hamburger -->
  <div class="nav-cursive">Out There</div>
  <button class="nav-burger" id="nav-burger" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile dropdown menu -->
  <div class="nav-menu" id="nav-menu">
    <a href="#games">Games</a>
    <a href="#shop">Shop</a>
    <a href="#about">About</a>
    <a href="#crew">Crew</a>
    <a href="#" class="nav-menu-cta">Join The Crew</a>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero" id="hero">
  <div class="hero-content">
    <!-- Static badge logo -->
    <div class="hero-logo" id="hero-logo">
      <img src="assets/loading/ring.svg" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%" />
      <img src="assets/loading/astronaut.svg" alt="Hazy Space Ranger Studios" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1" />
    </div>

    <!-- Text -->
    <div class="hero-text" id="hero-text">
      <div class="hero-headline" id="hero-headline"></div>
      <div class="hero-body" id="hero-body"></div>
    </div>
  </div>
</section>

<!-- Games transition divider -->
<section class="transition" id="transition">
  <span class="transition-line"></span>
  <h3>Games</h3>
  <span class="transition-line"></span>
</section>

<!-- Project Celestra Section -->
<section class="celestra" id="celestra">
  <div class="celestra-text">
    <h2>Project Celestra</h2>
    <p>Our first voyage. A tabletop adventure charting the far edge of the known galaxy — strange worlds, fierce crews, and everything waiting Out There. Transmissions incoming.</p>
  </div>
  <!-- the starfield assembles into the ant here -->
  <div class="celestra-ant" id="celestra-ant"></div>
</section>

<script>
// === Intro animation sequence ===
(() => {
  const TYPE_SPEED = 15;        // ms per character
  const STRIPE_STAGGER = 220;   // delay between each stripe reveal
  const FORM_DELAY = 300;       // wait before stripes/logo appear
  const TYPE_DELAY = 1100;      // wait before typing begins

  const headlineText = "Something's Out There";
  const bodyText = 'Hazy Space Ranger Studios is a Chicago tabletop game studio building worlds worth exploring. Our first voyage is right across the event horizon so stay tuned.';

  const heroLogo = document.getElementById('hero-logo');
  const heroText = document.getElementById('hero-text');
  const heroHeadline = document.getElementById('hero-headline');
  const heroBody = document.getElementById('hero-body');

  function begin() {
    // Reveal the background layers
    document.getElementById('particle-canvas').classList.add('visible');
    document.getElementById('shooting-stars').classList.add('visible');
    document.getElementById('stripes-canvas').classList.add('visible');

    // The badge logo and text load in together
    setTimeout(() => {
      heroLogo.classList.add('visible');
      heroText.classList.add('visible');
      typeText(heroHeadline, headlineText, () => {
        heroHeadline.classList.add('done');
        typeText(heroBody, bodyText, () => {
          heroBody.classList.add('done');
          const cursor = heroBody.querySelector('.cursor');
          if (cursor) cursor.remove();
        });
      });
    }, FORM_DELAY);

    // The stripes form (halftone, top → down), staggered by color
    for (let i = 0; i < 4; i++) {
      setTimeout(() => { if (window.STRIPES) window.STRIPES.start(i); }, FORM_DELAY + i * STRIPE_STAGGER);
    }
  }

  // Typewriter effect
  function typeText(el, text, onComplete) {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    (function tick() {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        setTimeout(tick, TYPE_SPEED);
      } else {
        cursor.remove();
        if (onComplete) onComplete();
      }
    })();
  }

  if (document.readyState === 'complete') begin();
  else window.addEventListener('load', begin);
})();
</script>

<script>
// === Mobile nav hamburger ===
(() => {
  const burger = document.getElementById('nav-burger');
  const menu = document.getElementById('nav-menu');
  if (!burger || !menu) return;
  const setOpen = (open) => {
    burger.classList.toggle('open', open);
    menu.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  burger.addEventListener('click', () => setOpen(!menu.classList.contains('open')));
  // close when a link is tapped or when leaving mobile width
  menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => setOpen(false)));
  window.addEventListener('resize', () => { if (window.innerWidth >= 768) setOpen(false); });
})();
</script>

<script type="module">
// === Interactive Particle Background ===
import * as THREE from 'three';
(() => {
  const PARTICLE_COUNT = 5600;
  const ANT_COUNT = 2600;       // first N particles assemble into the ant
  const TOUCH_SIZE = 96;   // higher-res touch field so a tight glow stays smooth

  // --- Simplex 2D noise (inline GLSL) ---
  const snoise2D = `
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}
vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1;i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m;m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0;
  vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5);
  vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}`;

  // --- Vertex Shader ---
  const vertexShader = `
${snoise2D}
attribute float pindex;
attribute vec3 offset;
attribute vec3 antTarget;
attribute float isAnt;
attribute float angle;
attribute float size;
attribute float brightness;

uniform float uTime;
uniform float uDepth;
uniform float uSize;
uniform float uPush;
uniform float uForm;
uniform sampler2D uTouch;
uniform vec2 uResolution;

varying float vBrightness;

void main(){
  float f = isAnt * uForm;   // how assembled into the ant this particle is

  // Free-floating home position with simplex drift (fades as it locks in)
  vec3 displaced=offset;
  float n=snoise(vec2(pindex*0.0015,uTime*0.08));
  float n2=snoise(vec2(pindex*0.002+100.0,uTime*0.06));
  displaced.x+=n*8.0;
  displaced.y+=n2*8.0;
  displaced.z+=snoise(vec2(pindex*0.001,uTime*0.04))*uDepth;

  // Ant target with a faint shimmer so the assembled ant still breathes
  vec3 target=antTarget;
  target.x+=sin(uTime*0.7+pindex)*1.0;
  target.y+=cos(uTime*0.6+pindex*1.2)*1.0;

  displaced=mix(displaced,target,f);

  // Touch displacement (mostly ignored once locked into the ant)
  vec2 touchUV=vec2(
    (displaced.x/uResolution.x)+0.5,
    1.0-((displaced.y/uResolution.y)+0.5)
  );
  float t=texture2D(uTouch,touchUV).r*(1.0-f*0.6);
  displaced.z+=t*uPush*2.0;
  displaced.x+=cos(angle)*t*uPush;
  displaced.y+=sin(angle)*t*uPush;

  // Twinkle + cursor/touch glow; ant particles settle a touch dimmer
  float twinkle=sin(uTime*1.5+pindex*0.5)*0.3+0.7;
  vBrightness=brightness*twinkle*mix(1.0,1.8,f) + t*1.4;

  vec4 mvPos=modelViewMatrix*vec4(displaced,1.0);
  gl_PointSize=size*uSize*(1.0+t*0.35);
  gl_Position=projectionMatrix*mvPos;
}`;

  // --- Fragment Shader ---
  const fragmentShader = `
varying float vBrightness;
void main(){
  vec2 uv=gl_PointCoord-0.5;
  float d=length(uv);
  float alpha=smoothstep(0.5,0.15,d)*vBrightness;
  gl_FragColor=vec4(vec3(1.0),alpha);
}`;

  // --- Touch Texture ---
  class TouchTexture {
    constructor() {
      this.size = TOUCH_SIZE;
      this.trail = [];
      this.last = {};          // per-pointer last position, keyed by id (mouse / finger)
      // radius of the glow/displacement splat as a fraction of the screen —
      // much tighter on mobile so the effect stays focused under the finger
      this.radiusFactor = window.innerWidth < 768 ? 0.03 : 0.045;
      this.canvas = document.createElement('canvas');
      this.canvas.width = this.canvas.height = this.size;
      this.ctx = this.canvas.getContext('2d');
      this.texture = new THREE.Texture(this.canvas);
      this.ctx.fillStyle = '#000';
      this.ctx.fillRect(0, 0, this.size, this.size);
    }
    addTouch(pt) {
      const id = pt.id == null ? 'mouse' : pt.id;
      const isTouch = id !== 'mouse';
      // speed-based intensity measured against THIS pointer's previous spot,
      // so multiple fingers/thumbs don't interfere with each other
      const prev = this.last[id];
      let force = 0.5;         // baseline so a stationary tap still glows
      if (prev) {
        const dx = pt.x - prev.x, dy = pt.y - prev.y;
        force = Math.min(Math.max(Math.sqrt(dx * dx + dy * dy) * 10, 0.4), 1);
      }
      this.last[id] = { x: pt.x, y: pt.y };
      // touch points glow stronger than the mouse (fingertips are bigger and
      // mobile only gets a glimpse between scroll repaints)
      this.trail.push({ x: pt.x, y: pt.y, age: 0, force, scale: isTouch ? 1.9 : 1.0 });
    }
    endTouch(id) { delete this.last[id == null ? 'mouse' : id]; }
    update() {
      this.ctx.fillStyle = 'rgba(0,0,0,0.08)';   // slower fade → trail lingers
      this.ctx.fillRect(0, 0, this.size, this.size);
      const LIFE = 140;                           // longer-lived trail
      for (let i = this.trail.length - 1; i >= 0; i--) {
        const p = this.trail[i];
        p.age++;
        if (p.age > LIFE) { this.trail.splice(i, 1); continue; }
        const intensity = (1 - p.age / LIFE) * Math.max(p.force, 0.2) * (p.scale || 1);
        const rad = this.size * this.radiusFactor * Math.min(intensity, 1.0);   // size capped
        const px = p.x * this.size, py = (1 - p.y) * this.size;
        const g = this.ctx.createRadialGradient(px, py, 0, px, py, rad);
        g.addColorStop(0, `rgba(255,255,255,${Math.min(1, 0.85 * intensity)})`);
        g.addColorStop(1, 'rgba(255,255,255,0)');
        this.ctx.beginPath();
        this.ctx.fillStyle = g;
        this.ctx.arc(px, py, rad, 0, Math.PI * 2);
        this.ctx.fill();
      }
      this.texture.needsUpdate = true;
    }
  }

  // --- Init ---
  const canvas = document.getElementById('particle-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight, false);

  const scene = new THREE.Scene();
  const fovH = window.innerHeight / 2;
  const camera = new THREE.OrthographicCamera(
    -window.innerWidth / 2, window.innerWidth / 2,
    fovH, -fovH, 1, 1000
  );
  camera.position.z = 500;

  const touchTex = new TouchTexture();

  // Create particles
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const antTargets = new Float32Array(PARTICLE_COUNT * 3);
  const isAnt = new Float32Array(PARTICLE_COUNT);
  const pindices = new Float32Array(PARTICLE_COUNT);
  const angles = new Float32Array(PARTICLE_COUNT);
  const sizes = new Float32Array(PARTICLE_COUNT);
  const brightnesses = new Float32Array(PARTICLE_COUNT);

  const w = window.innerWidth, h = window.innerHeight;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions[i * 3] = (Math.random() - 0.5) * w * 1.2;
    positions[i * 3 + 1] = (Math.random() - 0.5) * h * 1.2;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
    // default target = home (overwritten for ant particles after sampling)
    antTargets[i * 3] = positions[i * 3];
    antTargets[i * 3 + 1] = positions[i * 3 + 1];
    antTargets[i * 3 + 2] = 0;
    isAnt[i] = 0;
    pindices[i] = i;
    angles[i] = Math.random() * Math.PI * 2;
    // ant particles (first ANT_COUNT) are a touch finer
    sizes[i] = i < ANT_COUNT ? Math.random() * 1.0 + 0.7 : Math.random() * 1.5 + 0.5;
    // ant stars get a WIDE brightness spread (0.15–1.0) so the constellation
    // has real value variation — some dim, some bright — and reads as lifelike
    brightnesses[i] = i < ANT_COUNT ? Math.random() * 0.85 + 0.15 : Math.random() * 0.6 + 0.2;
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0, 0, 0]), 3));
  const instGeom = new THREE.InstancedBufferGeometry();
  instGeom.index = geom.index;
  instGeom.attributes.position = geom.attributes.position;
  const antAttr = new THREE.InstancedBufferAttribute(antTargets, 3);
  const isAntAttr = new THREE.InstancedBufferAttribute(isAnt, 1);
  instGeom.setAttribute('offset', new THREE.InstancedBufferAttribute(positions, 3));
  instGeom.setAttribute('antTarget', antAttr);
  instGeom.setAttribute('isAnt', isAntAttr);
  instGeom.setAttribute('pindex', new THREE.InstancedBufferAttribute(pindices, 1));
  instGeom.setAttribute('angle', new THREE.InstancedBufferAttribute(angles, 1));
  instGeom.setAttribute('size', new THREE.InstancedBufferAttribute(sizes, 1));
  instGeom.setAttribute('brightness', new THREE.InstancedBufferAttribute(brightnesses, 1));

  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uDepth: { value: 30.0 },
      // stars are smaller on mobile (they read proportionally larger on a small
      // viewport, so the field needs a finer point size there)
      uSize: { value: window.innerWidth < 768 ? 2.2 : 4.0 },
      // how far stars are pushed from the pointer — much smaller on mobile so
      // the movement stays tight to the finger
      uPush: { value: window.innerWidth < 768 ? 9.0 : 20.0 },
      uForm: { value: 0 },
      uTouch: { value: touchTex.texture },
      uResolution: { value: new THREE.Vector2(w, h) },
    },
    transparent: true,
    depthTest: false,
    blending: THREE.AdditiveBlending,
  });

  const points = new THREE.Points(instGeom, material);
  scene.add(points);

  // ---- Project Celestra ant: a segment of the starfield assembles into the
  // ant silhouette when its section scrolls into view (and disperses when it
  // leaves). Targets follow the section's anchor as the page scrolls. ----
  const antAnchor = document.getElementById('celestra-ant');
  let antPts = null, antReady = false;

  function sampleAnt() {
    const SZ = 200;
    const aw = SZ, ah = Math.round(SZ * 676 / 738);   // preserve mask aspect
    const off = document.createElement('canvas');
    off.width = aw; off.height = ah;
    const octx = off.getContext('2d');
    const img = new Image();
    img.onload = () => {
      octx.clearRect(0, 0, aw, ah);
      try { octx.drawImage(img, 0, 0, aw, ah); } catch (e) { return; }
      const data = octx.getImageData(0, 0, aw, ah).data;
      const pts = [];
      for (let y = 0; y < ah; y++)
        for (let x = 0; x < aw; x++)
          if (data[(y * aw + x) * 4 + 3] > 60) pts.push({ u: x / aw, v: y / ah });
      for (let i = pts.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; const t = pts[i]; pts[i] = pts[j]; pts[j] = t; }
      antPts = pts;
      const n = Math.min(ANT_COUNT, pts.length);
      for (let k = 0; k < n; k++) isAnt[k] = 1;
      isAntAttr.needsUpdate = true;
      antReady = true;
    };
    img.onerror = () => {};
    img.src = 'assets/ant-mask.png';
  }
  sampleAnt();

  function updateAntTargets(r) {
    const W = window.innerWidth, H = window.innerHeight;
    const n = Math.min(ANT_COUNT, antPts.length);
    for (let k = 0; k < n; k++) {
      const p = antPts[k];
      const sx = r.left + p.u * r.width;     // screen px
      const sy = r.top + p.v * r.height;
      antTargets[k * 3] = sx - W / 2;        // → world (centre origin, y up)
      antTargets[k * 3 + 1] = H / 2 - sy;
    }
    antAttr.needsUpdate = true;
  }

  // assemble as the section scrolls UP into view, fully formed once the whole
  // anchor (legs included) is on screen, so the ant is never cut off when it
  // settles. Ramps with the anchor height, so it's reachable on any viewport.
  function updateAnt() {
    if (!antReady) return;
    const r = antAnchor.getBoundingClientRect();
    const vh = window.innerHeight;
    const vis = Math.max(0, Math.min(1, (vh - r.top) / r.height));
    const u = material.uniforms.uForm;
    u.value += (vis - u.value) * 0.08;
    if (vis > 0.02 || u.value > 0.02) updateAntTargets(r);
  }

  // Mouse/touch events â€” map screen coords to 0-1 UV for the touch texture
  function addPoint(clientX, clientY, id) {
    touchTex.addTouch({
      x: clientX / window.innerWidth,
      y: clientY / window.innerHeight,
      id
    });
  }
  function onMouseMove(e) { addPoint(e.clientX, e.clientY, 'mouse'); renderFrame(); }
  // handle every finger/thumb that moved or touched down this event
  function onTouch(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      addPoint(t.clientX, t.clientY, t.identifier);
    }
    // Repaint immediately from the touch handler. Mobile browsers (notably iOS
    // Safari) pause requestAnimationFrame during an active scroll, but touch
    // events keep firing — so driving a render here keeps the glow alive and
    // tracking the finger even while the page is scrolling.
    renderFrame();
  }
  function onTouchEnd(e) {
    for (let i = 0; i < e.changedTouches.length; i++) touchTex.endTouch(e.changedTouches[i].identifier);
  }
  window.addEventListener('mousemove', onMouseMove, { passive: true });
  window.addEventListener('touchstart', onTouch, { passive: true });
  window.addEventListener('touchmove', onTouch, { passive: true });
  window.addEventListener('touchend', onTouchEnd, { passive: true });
  window.addEventListener('touchcancel', onTouchEnd, { passive: true });

  // Single render path, drivable by BOTH rAF and touch events. A min-interval
  // throttle de-dupes the two sources so we never double-render a frame.
  let lastRender = performance.now();
  function renderFrame() {
    const now = performance.now();
    if (now - lastRender < 13) return;            // cap ~75fps
    const dt = Math.min((now - lastRender) / 1000, 0.05);
    lastRender = now;
    material.uniforms.uTime.value += dt;
    updateAnt();
    touchTex.update();
    renderer.render(scene, camera);
  }
  function animate() {
    requestAnimationFrame(animate);
    renderFrame();
  }
  animate();

  // Resize
  window.addEventListener('resize', () => {
    const w2 = window.innerWidth, h2 = window.innerHeight;
    renderer.setSize(w2, h2, false);
    camera.left = -w2 / 2; camera.right = w2 / 2;
    camera.top = h2 / 2; camera.bottom = -h2 / 2;
    camera.updateProjectionMatrix();
    material.uniforms.uResolution.value.set(w2, h2);
    material.uniforms.uSize.value = w2 < 768 ? 2.2 : 4.0;
    material.uniforms.uPush.value = w2 < 768 ? 9.0 : 20.0;
    touchTex.radiusFactor = w2 < 768 ? 0.03 : 0.045;
  });
})();
</script>

<script>
// === Right-side Racing Stripes: diagonal→vertical bars, halftone top→down ===
(() => {
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const REVEAL_DUR = 2200;          // ms for one bar to fully form
  const COLORS = ['#360084', '#8F0178', '#DF1A58', '#F5B345'];
  const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

  const canvas = document.getElementById('stripes-canvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, VH = 0;   // W=width, H=document height, VH=viewport height (all device px)

  // Each bar: a centerline that enters diagonally at the top then runs straight
  // down the right side. Geometry is derived from the viewport so it scales.
  const bars = COLORS.map(color => ({
    color, pts: null, cum: null, L: 0, barW: 0,
    progress: 0, startTime: 0, running: false,
    // time-based dissolve animation state (0 = solid, 1 = gone)
    dissolve: 0, dissFrom: 0, dissTarget: 0, dissStart: 0,
  }));

  const DISS_DUR = 750;       // ms for one bar to dissolve / re-form
  const DISS_STAGGER = 170;   // ms between bars

  function setPts(b, pts, barW) {
    const l0 = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    const l1 = Math.hypot(pts[2].x - pts[1].x, pts[2].y - pts[1].y);
    b.pts = pts; b.cum = [0, l0, l0 + l1]; b.L = l0 + l1; b.barW = barW;
  }

  // Vertical runs down the right side, each top kicking out diagonally up-RIGHT
  // to the top edge (elbow points left); staggered down-right. The bar bottoms
  // are STAGGERED (stair-stepped) — purple shortest, yellow longest. Shared by
  // desktop and mobile (mobile just uses tighter sizing + a tighter right edge).
  function buildBars(cfg) {
    const { barW, stepX, stepY, edgeX, bendY0, bottom0, bottomStep } = cfg;
    const pad = barW * 2;
    const xv0 = edgeX - 3 * stepX;    // outermost (purple) vertical-run x
    bars.forEach((b, k) => {
      const xv = xv0 + k * stepX, bendY = bendY0 + k * stepY;
      const bottomY = Math.min((bottom0 + k * bottomStep) * VH, H); // stair-step
      setPts(b, [
        { x: xv + (bendY + pad), y: -pad },   // entry: 45° up to the top-right
        { x: xv, y: bendY },                  // elbow
        { x: xv, y: bottomY },                // staggered bottom (stair-step)
      ], barW);
    });
  }

  function buildDesktop() {
    buildBars({
      barW: Math.max(15 * DPR, 0.026 * W),   // Figma stripe width (~37px @1440)
      stepX: 0.042 * W,                      // center spacing (Figma ~60px @1440)
      stepY: 0.042 * W * 0.5,                // downward stagger (Figma ~2:1)
      edgeX: 0.935 * W,                      // innermost (yellow) vertical
      bendY0: 0.15 * VH,                     // base elbow height (vs viewport top)
      bottom0: 1.15, bottomStep: 0.2,        // bottoms at 1.15→1.75 viewport-heights
    });
  }

  // Mobile: same vertical-right orientation (the updated comp), tighter sizing
  // and nearer the right edge.
  function buildMobile() {
    buildBars({
      barW: Math.max(6 * DPR, 0.022 * W),
      stepX: 0.05 * W,
      stepY: 0.05 * W * 0.5,
      edgeX: 0.95 * W,
      bendY0: 0.09 * VH,
      bottom0: 0.85, bottomStep: 0.16,
    });
  }

  function buildGeometry() {
    const cssW = window.innerWidth;
    // measure the document height with the canvas collapsed so it doesn't
    // inflate the page, then size the canvas to span the whole document
    canvas.style.height = '0px';
    const cssH = Math.max(document.documentElement.scrollHeight, window.innerHeight);
    W = Math.round(cssW * DPR);
    VH = Math.round(window.innerHeight * DPR);
    H = Math.round(cssH * DPR);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = '100%';
    canvas.style.height = cssH + 'px';
    if (cssW < 768) buildMobile(); else buildDesktop();
  }

  // position + unit tangent at arc-length s along a bar's centerline
  function at(b, s) {
    s = Math.max(0, Math.min(b.L, s));
    const i = s <= b.cum[1] ? 0 : 1;
    const a = b.pts[i], c = b.pts[i + 1];
    const segLen = b.cum[i + 1] - b.cum[i];
    const t = segLen > 0 ? (s - b.cum[i]) / segLen : 0;
    const dx = c.x - a.x, dy = c.y - a.y, len = Math.hypot(dx, dy) || 1;
    return { x: a.x + dx * t, y: a.y + dy * t, tx: dx / len, ty: dy / len };
  }

  function drawBar(b) {
    // effective progress = how much it has revealed, minus how much it has
    // dissolved back (scroll-driven). As dissolve rises, the bar retracts from
    // its leading (bottom) edge back into halftone — a reverse of the reveal.
    const prog = b.progress * (1 - (b.dissolve || 0));
    if (prog <= 0) return;
    const band = b.L * 0.16;                       // halftone transition length
    const revealed = prog * (b.L + band);
    const solidLen = revealed - band;

    // solid portion: stroke the centerline up to solidLen
    if (solidLen > 0) {
      ctx.strokeStyle = b.color;
      ctx.lineWidth = b.barW;
      ctx.lineCap = 'butt';     // sharp, flat ends
      ctx.lineJoin = 'miter';   // sharp elbow corner
      ctx.miterLimit = 10;
      ctx.beginPath();
      ctx.moveTo(b.pts[0].x, b.pts[0].y);
      for (let i = 0; i < 2; i++) {
        if (b.cum[i + 1] <= solidLen) { ctx.lineTo(b.pts[i + 1].x, b.pts[i + 1].y); }
        else { const p = at(b, solidLen); ctx.lineTo(p.x, p.y); break; }
      }
      ctx.stroke();
    }

    // halftone band: rows of dots across the bar width, shrinking toward the
    // leading edge so the bar "forms" out of dots as it sweeps along its length
    const cell = b.barW * 0.34;
    const maxR = cell * 0.5;
    const halfW = b.barW * 0.5;
    ctx.fillStyle = b.color;
    const from = Math.max(0, solidLen);
    const to = Math.min(revealed, b.L);
    for (let s = from; s < to; s += cell) {
      const cov = Math.max(0, Math.min(1, (revealed - s) / band));
      const r = cov * maxR;
      if (r < 0.4) continue;
      const p = at(b, s);
      const nx = -p.ty, ny = p.tx;                 // unit normal across the bar
      const rowShift = (((s / cell) | 0) % 2) ? cell * 0.5 : 0;
      for (let o = -halfW; o <= halfW; o += cell) {
        ctx.beginPath();
        ctx.arc(p.x + nx * (o + rowShift), p.y + ny * (o + rowShift), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  let rafId = null;
  function tick(now) {
    ctx.clearRect(0, 0, W, H);
    let anyRunning = false;
    for (const b of bars) {
      // load reveal animation
      if (b.running) {
        const t = Math.min((now - b.startTime) / REVEAL_DUR, 1);
        b.progress = easeInOutCubic(t);
        if (t >= 1) { b.progress = 1; b.running = false; }
        else anyRunning = true;
      }
      // time-based dissolve / re-form animation (scroll-triggered, plays on its own)
      if (b.dissolve !== b.dissTarget) {
        const dt = (now - b.dissStart) / DISS_DUR;
        if (dt <= 0) { anyRunning = true; }                       // still in stagger delay
        else if (dt >= 1) { b.dissolve = b.dissTarget; }
        else { b.dissolve = b.dissFrom + (b.dissTarget - b.dissFrom) * easeInOutCubic(dt); anyRunning = true; }
      }
      drawBar(b);
    }
    rafId = anyRunning ? requestAnimationFrame(tick) : null;
  }

  function redrawStatic() {
    ctx.clearRect(0, 0, W, H);
    for (const b of bars) drawBar(b);
  }

  buildGeometry();

  window.STRIPES = {
    start(i) {
      const b = bars[i];
      if (!b) return;
      b.startTime = performance.now();
      b.running = true;
      b.progress = 0;
      if (rafId === null) rafId = requestAnimationFrame(tick);
    }
  };

  // Reverse dissolve as a one-shot, time-based animation that fires when you
  // scroll PAST a threshold (just past the marquee) — NOT scrubbed by scroll
  // position. It plays on its own; the bars stay gone until you scroll back up
  // above the trigger, which fires the re-form animation.
  function animateDissolve(target, yellowFirst) {
    const now = performance.now();
    bars.forEach((b, i) => {
      b.dissFrom = b.dissolve;
      b.dissTarget = target;
      const order = yellowFirst ? (3 - i) : i;   // dissolve: yellow→purple; reform: purple→yellow
      b.dissStart = now + order * DISS_STAGGER;
    });
    if (rafId === null) rafId = requestAnimationFrame(tick);
  }

  let dissolved = false, scrollRaf = null;
  function onScrollCheck() {
    scrollRaf = null;
    const vh = window.innerHeight;
    const downThreshold = vh * 0.55;   // scroll past ~half the marquee → dissolve
    const upThreshold = vh * 0.45;     // back above this → re-form (hysteresis)
    if (!dissolved && window.scrollY > downThreshold) {
      dissolved = true;
      animateDissolve(1, true);        // disappear, yellow first
    } else if (dissolved && window.scrollY < upThreshold) {
      dissolved = false;
      animateDissolve(0, false);       // re-form, purple first
    }
  }
  window.addEventListener('scroll', () => {
    if (scrollRaf === null) scrollRaf = requestAnimationFrame(onScrollCheck);
  }, { passive: true });

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      buildGeometry();
      if (rafId === null) redrawStatic();   // keep finished bars in place
    }, 120);
  });
})();
</script>

<script>
// === Shooting Stars ===
(() => {
  const canvas = document.getElementById('shooting-stars');
  const ctx = canvas.getContext('2d');
  const stars = [];
  const MIN_INTERVAL = 2500;
  const MAX_INTERVAL = 7000;

  function resize() {
    canvas.width = window.innerWidth * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resize();
  window.addEventListener('resize', resize);

  function spawn() {
    const w = window.innerWidth, h = window.innerHeight;
    const edge = Math.floor(Math.random() * 4);
    let x, y, angle;

    if (edge === 0) {
      // top edge â€” streak downward
      x = Math.random() * w;
      y = -10;
      angle = (Math.random() * 50 + 20) * (Math.PI / 180);
    } else if (edge === 1) {
      // right edge â€” streak left
      x = w + 10;
      y = Math.random() * h * 0.7;
      angle = (Math.random() * 40 + 160) * (Math.PI / 180);
    } else if (edge === 2) {
      // left edge â€” streak right
      x = -10;
      y = Math.random() * h * 0.7;
      angle = (Math.random() * 40 - 20) * (Math.PI / 180);
    } else {
      // bottom edge â€” streak upward
      x = Math.random() * w;
      y = h + 10;
      angle = (Math.random() * 50 - 245) * (Math.PI / 180);
    }

    const speed = Math.random() * 450 + 450;
    const length = Math.random() * 140 + 90;
    stars.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      length,
      life: 1,
      decay: Math.random() * 0.3 + 0.45,
      width: Math.random() * 0.8 + 0.6,
    });
    setTimeout(spawn, MIN_INTERVAL + Math.random() * (MAX_INTERVAL - MIN_INTERVAL));
  }
  setTimeout(spawn, 2000);

  let prev = performance.now();
  function animate(now) {
    requestAnimationFrame(animate);
    const dt = (now - prev) / 1000;
    prev = now;

    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.life -= s.decay * dt;

      if (s.life <= 0 || s.x > window.innerWidth + 100 || s.y > window.innerHeight + 100) {
        stars.splice(i, 1);
        continue;
      }

      const tailX = s.x - (s.vx / Math.sqrt(s.vx * s.vx + s.vy * s.vy)) * s.length * s.life;
      const tailY = s.y - (s.vy / Math.sqrt(s.vx * s.vx + s.vy * s.vy)) * s.length * s.life;

      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(0.6, `rgba(255,255,255,${s.life * 0.25})`);
      grad.addColorStop(1, `rgba(255,255,255,${s.life * 0.7})`);

      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width;
      ctx.lineCap = 'round';
      ctx.stroke();

      // faint glow around trail
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = `rgba(255,255,255,${s.life * 0.07})`;
      ctx.lineWidth = s.width * 3;
      ctx.stroke();

      // head
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.width * 1.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.life * 0.7})`;
      ctx.fill();
    }
  }
  requestAnimationFrame(animate);
})();
</script>
